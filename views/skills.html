<div class="bg-dark text-center text-white  p-3 p-sm-4 rounded shadow">

  <h1 class="text-center mb-4">Skills</h1>

  <div class="table responsive">
    <table class="table table-dark table-bordered table-hover mb-0">
    <thead>
      <tr>
        <th>Category</th>
        <th>Skills</th>
      </tr>
    </thead>

    <tbody>
      <tr ng-repeat="skill in skills">
        <td><strong>{{skill.category}}</strong></td>
        <td>
          <span ng-repeat="item in skill.items">
            {{item}}{{$last ? '' : ', '}}
          </span>
        </td>
      </tr>
    </tbody>

  </table>
</div>
</div>
